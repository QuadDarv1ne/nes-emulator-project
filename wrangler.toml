# Cloudflare Pages конфигурация
# Документация: https://developers.cloudflare.com/pages/configuration/

[build]
command = "bun run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"

# Переменные окружения (настройте в Cloudflare Dashboard)
