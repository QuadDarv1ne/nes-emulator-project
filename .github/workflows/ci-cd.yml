# CI/CD для NES Emulator
# Автоматическая проверка кода, тесты и сборка

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Проверка типов и линтинг
  lint-and-typecheck:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔍 Run ESLint
        run: bun run lint

      - name: 📘 TypeScript type check
        run: bunx tsc --noEmit

  # Сборка проекта
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔧 Generate Prisma Client
        run: bun run db:generate

      - name: 🏗️ Build project
        run: bun run build
        env:
          NODE_ENV: production

      - name: 📁 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/standalone
          retention-days: 7

  # Docker сборка (опционально)
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t nes-emulator:${{ github.sha }} .

      # Раскомментировать для публикации в Docker Hub
      # - name: 📤 Push to Docker Hub
      #   uses: docker/build-push-action@v5
      #   with:
      #     push: true
      #     tags: yourusername/nes-emulator:latest
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}

  # Деплой на Vercel (опционально)
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🚀 Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
        continue-on-error: true
