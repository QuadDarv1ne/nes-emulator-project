# GitHub Pages (статический экспорт)
# Примечание: Next.js требует статический экспорт для GitHub Pages

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🥟 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install

      - name: 🔧 Generate Prisma Client
        run: bun run db:generate

      - name: 🏗️ Build static export
        run: |
          # Создаём временную копию next.config.ts для статического экспорта
          cp next.config.ts next.config.ts.backup
          echo 'const nextConfig = { output: "export", images: { unoptimized: true } }; export default nextConfig;' > next.config.ts
          bun run build
          mv next.config.ts.backup next.config.ts

      - name: 📁 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
